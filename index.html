<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #f5f5f5;
    font-family: sans-serif;
  }
  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.2rem 1rem 1.5rem;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    width: 320px;
    position: relative;
  }
  .mode-toggle {
    position: absolute;
    top: 14px;
    left: 14px;
    display: flex;
    background: #f0f0f0;
    border-radius: 20px;
    padding: 3px;
    gap: 2px;
  }
  .mode-toggle button {
    padding: 5px 12px;
    border-radius: 16px;
    border: none;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    background: transparent;
    color: #999;
    transition: all 0.2s;
  }
  .mode-toggle button.active {
    background: #fff;
    color: #333;
    box-shadow: 0 1px 4px rgba(0,0,0,0.12);
  }
  .hint { font-size: 13px; color: #999; margin-top: 0.8rem; }
  .btn-row { display: flex; gap: 10px; margin-top: 1.2rem; width: 280px; }
  .btn-row button {
    flex: 1; padding: 11px 0; border-radius: 24px;
    font-size: 14px; font-weight: 500; cursor: pointer;
  }
  #stopRow { display: none; margin-top: 1.2rem; width: 280px; }
  #stopBtn {
    width: 100%; padding: 13px 0; border-radius: 24px;
    font-size: 15px; font-weight: 500; cursor: pointer;
    border: none; letter-spacing: 0.05em;
  }
  .palette-label {
    font-size: 12px; color: #bbb; text-align: center;
    margin-bottom: 0.6rem; letter-spacing: 0.08em;
  }
  #paletteRow { display: flex; justify-content: center; gap: 12px; }
  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.35); z-index: 99;
    align-items: center; justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: #fff; border-radius: 12px;
    padding: 1.5rem; width: 260px;
    border: 0.5px solid #ddd;
  }
  .modal h3 { font-size: 16px; font-weight: 500; margin-bottom: 1rem; color: #333; }
  .time-inputs { display: flex; gap: 8px; align-items: center; justify-content: center; margin-bottom: 1.2rem; }
  .time-inputs input {
    width: 60px; text-align: center; font-size: 20px;
    padding: 6px; border-radius: 8px;
    border: 1px solid #ccc; background: #f5f5f5; color: #333;
  }
  .time-inputs span { font-size: 20px; color: #888; }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btns button {
    flex: 1; padding: 10px 0; border-radius: 24px;
    border: none; font-size: 14px; font-weight: 500; cursor: pointer;
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="mode-toggle">
    <button id="modeTimer" class="active">タイマー</button>
    <button id="modeStop">ストップウォッチ</button>
  </div>

  <div style="height:36px;"></div>

  <canvas id="c" width="280" height="280"></canvas>

  <div class="btn-row" id="timerBtns">
    <button id="setBtn" style="border:1.5px solid #ed93b1;background:#fbeaf0;color:#72243e;">時間設定</button>
    <button id="startBtn" style="border:none;background:#d4537e;color:#fff;">スタート</button>
    <button id="resetBtn" style="border:none;background:#f4c0d1;color:#72243e;">リセット</button>
  </div>

  <div id="stopRow">
    <button id="stopBtn" style="background:#d4537e;color:#fff;">通知音を止める</button>
  </div>

  <div class="btn-row" id="swBtns" style="display:none;">
    <button id="swStartBtn" style="border:none;background:#d4537e;color:#fff;">スタート</button>
    <button id="swResetBtn" style="border:none;background:#f4c0d1;color:#72243e;">リセット</button>
  </div>

  <p id="hint" class="hint">「時間設定」で時間を決めてからスタート</p>

  <div style="margin-top:1.4rem;width:280px;">
    <p class="palette-label">カラーテーマ</p>
    <div id="paletteRow"></div>
  </div>
</div>

<div id="modal" class="modal-bg">
  <div class="modal">
    <h3>時間を設定</h3>
    <div class="time-inputs">
      <input type="number" id="inputMin" value="1" min="0" max="99"/>
      <span>分</span>
      <input type="number" id="inputSec" value="15" min="0" max="59"/>
      <span>秒</span>
    </div>
    <div class="modal-btns">
      <button id="cancelBtn" style="background:#eee;color:#555;">キャンセル</button>
      <button id="okBtn" style="background:#d4537e;color:#fff;">セット</button>
    </div>
  </div>
</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=280,H=280,cx=140,cy=140,R_OUT=122,R_IN=44,RINGS=8;
const START=-Math.PI/2;

const THEMES=[
  {name:'ピンク',    light:'#fbeaf0',mid:'#f4c0d1',border:'#ed93b1',strong:'#d4537e',text:'#72243e'},
  {name:'スカイ',    light:'#e8f4fb',mid:'#b5d4f4',border:'#85b7eb',strong:'#378add',text:'#0c447c'},
  {name:'ミント',    light:'#e1f5ee',mid:'#9fe1cb',border:'#5dcaa5',strong:'#1d9e75',text:'#085041'},
  {name:'ラベンダー',light:'#eeedfe',mid:'#cecbf6',border:'#afa9ec',strong:'#7f77dd',text:'#3c3489'},
  {name:'ピーチ',    light:'#faece7',mid:'#f5c4b3',border:'#f0997b',strong:'#d85a30',text:'#4a1b0c'},
  {name:'サンド',    light:'#f1efe8',mid:'#d3d1c7',border:'#b4b2a9',strong:'#888780',text:'#2c2c2a'},
];
let theme=THEMES[0];
let mode='timer';

// タイマー

function applyTheme(t){
  theme=t;
  document.getElementById('setBtn').style.background=theme.light;
  document.getElementById('setBtn').style.borderColor=theme.border;
  document.getElementById('setBtn').style.color=theme.text;
  document.getElementById('startBtn').style.background=theme.strong;
  document.getElementById('resetBtn').style.background=theme.mid;
  document.getElementById('resetBtn').style.color=theme.text;
  document.getElementById('okBtn').style.background=theme.strong;
  document.getElementById('stopBtn').style.background=theme.strong;
  document.getElementById('swStartBtn').style.background=theme.strong;
  document.getElementById('swResetBtn').style.background=theme.mid;
  document.getElementById('swResetBtn').style.color=theme.text;
  document.querySelectorAll('.palette-dot').forEach((d,i)=>{
    d.style.outline=THEMES[i]===theme?`2.5px solid ${THEMES[i].border}`:'none';
    d.style.outlineOffset='2px';
  });
  draw();
}

function switchMode(m){
  mode=m;
  clearInterval(timerInterval);timerRunning=false;
  stopAlarm();
  clearInterval(swInterval);swRunning=false;
  if(mode==='timer'){
    document.getElementById('modeTimer').classList.add('active');
    document.getElementById('modeStop').classList.remove('active');
    document.getElementById('timerBtns').style.display='flex';
    document.getElementById('swBtns').style.display='none';
    document.getElementById('startBtn').textContent='スタート';
    document.getElementById('hint').textContent='「時間設定」で時間を決めてからスタート';
  } else {
    document.getElementById('modeTimer').classList.remove('active');
    document.getElementById('modeStop').classList.add('active');
    document.getElementById('timerBtns').style.display='none';
    document.getElementById('swBtns').style.display='flex';
    document.getElementById('swStartBtn').textContent='スタート';
    document.getElementById('hint').textContent='スタートを押して計測開始';
  }
  draw();
}

document.getElementById('modeTimer').addEventListener('click',()=>switchMode('timer'));
document.getElementById('modeStop').addEventListener('click',()=>switchMode('stopwatch'));

// タイマー操作
function timerTick(){
  if(remainSec<=0){
    clearInterval(timerInterval);timerRunning=false;
    document.getElementById('startBtn').textContent='スタート';
    document.getElementById('hint').textContent='完了！お疲れさまでした';
    draw();startAlarm();return;
  }
  remainSec--;draw();
}
document.getElementById('startBtn').addEventListener('click',()=>{
  if(remainSec<=0)return;
  if(timerRunning){
    clearInterval(timerInterval);timerRunning=false;
    document.getElementById('startBtn').textContent='スタート';
    document.getElementById('hint').textContent='一時停止中';
  }else{
    timerRunning=true;
    document.getElementById('startBtn').textContent='一時停止';
    document.getElementById('hint').textContent='タイマー稼働中';
    timerInterval=setInterval(timerTick,1000);
  }
});
document.getElementById('resetBtn').addEventListener('click',()=>{
  clearInterval(timerInterval);timerRunning=false;remainSec=totalSec;
  stopAlarm();
  document.getElementById('startBtn').textContent='スタート';
  document.getElementById('hint').textContent='「時間設定」で時間を決めてからスタート';
  draw();
});
document.getElementById('stopBtn').addEventListener('click',()=>{
  stopAlarm();
  document.getElementById('hint').textContent='お疲れさまでした';
});
document.getElementById('setBtn').addEventListener('click',()=>{
  if(timerRunning)return;
  document.getElementById('inputMin').value=Math.floor(totalSec/60);
  document.getElementById('inputSec').value=totalSec%60;
  document.getElementById('modal').classList.add('open');
});
document.getElementById('cancelBtn').onclick=()=>document.getElementById('modal').classList.remove('open');
document.getElementById('modal').onclick=e=>{if(e.target===document.getElementById('modal'))document.getElementById('modal').classList.remove('open');};
document.getElementById('okBtn').onclick=()=>{
  const m=parseInt(document.getElementById('inputMin').value)||0;
  const s=parseInt(document.getElementById('inputSec').value)||0;
  const t=m*60+s;
  if(t>0){totalSec=t;remainSec=t;}
  document.getElementById('modal').classList.remove('open');
  document.getElementById('hint').textContent=`${m}分${s}秒 セット済 — スタートを押してください`;
  draw();
};

// ストップウォッチ操作
document.getElementById('swStartBtn').addEventListener('click',()=>{
  if(swRunning){
    clearInterval(swInterval);swRunning=false;
    document.getElementById('swStartBtn').textContent='スタート';
    document.getElementById('hint').textContent='一時停止中';
  }else{
    swRunning=true;
    document.getElementById('swStartBtn').textContent='一時停止';
    document.getElementById('hint').textContent='計測中';
    swInterval=setInterval(()=>{swElapsed++;draw();},1000);
  }
});
document.getElementById('swResetBtn').addEventListener('click',()=>{
  clearInterval(swInterval);swRunning=false;swElapsed=0;
  document.getElementById('swStartBtn').textContent='スタート';
  document.getElementById('hint').textContent='スタートを押して計測開始';
  draw();
});

// パレット
const row=document.getElementById('paletteRow');
THEMES.forEach((t,i)=>{
  const dot=document.createElement('button');
  dot.className='palette-dot';
  dot.title=t.name;
  dot.style.cssText=`width:28px;height:28px;border-radius:50%;background:${t.mid};border:2px solid ${t.border};cursor:pointer;padding:0;`;
  dot.addEventListener('click',()=>applyTheme(t));
  row.appendChild(dot);
});

applyTheme(THEMES[0]);
</script>
</body>
</html>
